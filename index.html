<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pasapalabra - Edición Desafío</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
<script src="https://cdn.tailwindcss.com"></script>
<style>
  :root {
    --bg:#0a0e1a; --surface:#111827; --surface2:#1c2535;
    --gold:#f5c518; --gold2:#e6a800; --blue:#2563eb;
    --green:#22c55e; --red:#ef4444; --gray:#6b7280;
    --text:#f1f5f9; --text2:#94a3b8; --radius:16px;
  }
  body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; overflow-x: hidden; }
  .font-bebas { font-family: 'Bebas Neue', sans-serif; }
  
  .rosco-wrap { position: relative; width: min(420px, 85vw); height: min(420px, 85vw); margin: 0 auto; }
  #rsvg { width: 100%; height: 100%; }
  
  .c-def circle { fill: #1c2535; stroke: #3a4a66; stroke-width: 2; transition: all 0.3s; }
  .c-def text { fill: #f1f5f9; font-size: 14px; font-weight: bold; pointer-events: none; }
  .c-act circle { fill: #1a2a50; stroke: var(--gold); stroke-width: 4; filter: drop-shadow(0 0 8px rgba(245,197,24,0.6)); }
  .c-act text { fill: var(--gold); }
  .c-ok circle { fill: #14532d; stroke: var(--green); stroke-width: 3; }
  .c-ok text { fill: #86efac; }
  .c-no circle { fill: #450a0a; stroke: var(--red); stroke-width: 3; }
  .c-no text { fill: #fca5a5; }
  .c-sk circle { fill: #2a2000; stroke: var(--gold); stroke-width: 2; stroke-dasharray: 4; }

  .btn-select { background: var(--surface2); border: 2px solid #2a3448; transition: all 0.2s; }
  .btn-select.active { border-color: var(--gold); background: rgba(245,197,24,0.1); color: var(--gold); }
  
  .diff-easy { color: #22c55e; }
  .diff-medium { color: #2563eb; }
  .diff-hard { color: #f59e0b; }
  .diff-impossible { color: #ef4444; }

  .custom-scroll::-webkit-scrollbar { width: 6px; }
  .custom-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 10px; }
  
  @keyframes pulse-gold { 0% { opacity: 1; } 50% { opacity: 0.5; } 100% { opacity: 1; } }
  .listening { animation: pulse-gold 0.8s infinite; color: var(--gold); }
</style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

  <header class="text-center mb-6">
    <h1 class="font-bebas text-5xl md:text-7xl text-[#f5c518] tracking-widest drop-shadow-lg">PASAPALABRA</h1>
    <p class="text-xs uppercase tracking-[0.3em] text-slate-500 font-bold">Selector de Dificultad</p>
  </header>

  <!-- SETUP SCREEN -->
  <div id="setup" class="w-full max-w-lg space-y-4">
    <div class="bg-[#111827] border border-slate-800 p-6 rounded-2xl shadow-2xl space-y-6">
      
      <div>
        <h2 class="text-[#f5c518] font-bold text-sm uppercase mb-3 tracking-wider">🌟 Seleccionar Dificultad</h2>
        <div class="grid grid-cols-2 sm:grid-cols-4 gap-2">
          <button onclick="setDifficulty('easy', this)" class="btn-select active p-3 rounded-xl text-xs font-black">FÁCIL</button>
          <button onclick="setDifficulty('medium', this)" class="btn-select p-3 rounded-xl text-xs font-black">MEDIO</button>
          <button onclick="setDifficulty('hard', this)" class="btn-select p-3 rounded-xl text-xs font-black">DIFÍCIL</button>
          <button onclick="setDifficulty('impossible', this)" class="btn-select p-3 rounded-xl text-xs font-black">EXTREMO</button>
        </div>
        <p id="diff-desc" class="text-[11px] text-slate-400 mt-2 italic text-center">Palabras simples y mucho tiempo para pensar.</p>
      </div>

      <div>
        <h2 class="text-[#f5c518] font-bold text-sm uppercase mb-3 tracking-wider">⏱ Configurar Tiempo</h2>
        <div class="grid grid-cols-4 gap-2 mb-3">
          <button onclick="setGameTime(60, this)" class="btn-select p-2 rounded-lg text-xs font-bold">1 Min</button>
          <button onclick="setGameTime(120, this)" class="btn-select active p-2 rounded-lg text-xs font-bold">2 Min</button>
          <button onclick="setGameTime(180, this)" class="btn-select p-2 rounded-lg text-xs font-bold">3 Min</button>
          <button onclick="setGameTime(300, this)" class="btn-select p-2 rounded-lg text-xs font-bold">5 Min</button>
        </div>
        <div class="flex items-center gap-3 bg-[#0a0e1a] p-3 rounded-xl border border-slate-800">
          <label class="text-[10px] uppercase font-bold text-slate-500">Personalizado (seg):</label>
          <input type="number" id="custom-time" placeholder="Ej: 90" class="bg-transparent text-white font-bold outline-none w-20" oninput="setCustomTime(this.value)">
        </div>
      </div>
    </div>

    <button onclick="initGame()" class="w-full bg-[#f5c518] text-black font-bebas text-3xl py-4 rounded-2xl shadow-[0_0_20px_rgba(245,197,24,0.3)] hover:scale-[1.02] active:scale-95 transition-all">
      ¡EMPEZAR ROSCO!
    </button>
  </div>

  <!-- GAME SCREEN -->
  <div id="game" class="hidden w-full max-w-4xl flex-col items-center gap-4">
    <div class="w-full bg-[#111827] border border-slate-800 p-4 rounded-2xl flex flex-wrap items-center justify-between gap-4 shadow-xl">
      <div id="timer" class="font-bebas text-4xl text-[#f5c518] w-24 text-center">2:00</div>
      
      <div class="flex-1 min-w-[150px] h-3 bg-slate-800 rounded-full overflow-hidden">
        <div id="progress-bar" class="h-full bg-[#f5c518] transition-all duration-1000" style="width: 100%"></div>
      </div>

      <div class="flex gap-2">
        <div class="bg-green-500/10 border border-green-500/30 text-green-500 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1">✓ <span id="sc-ok">0</span></div>
        <div class="bg-red-500/10 border border-red-500/30 text-red-500 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1">✗ <span id="sc-no">0</span></div>
        <div class="bg-yellow-500/10 border border-yellow-500/30 text-yellow-500 px-3 py-1 rounded-full text-xs font-black flex items-center gap-1">↩ <span id="sc-sk">0</span></div>
      </div>

      <button onclick="askExit()" class="bg-slate-800 hover:bg-red-500/20 hover:text-red-400 text-slate-400 px-4 py-2 rounded-xl text-[10px] font-black uppercase transition-all">
        Salir
      </button>
    </div>

    <div class="rosco-wrap">
      <svg id="rsvg" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"></svg>
    </div>

    <div class="w-full max-w-2xl bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-2xl relative">
      <div class="flex items-baseline gap-3 mb-2">
        <span id="letter-label" class="font-bebas text-5xl text-[#f5c518]">A</span>
        <span id="clue-type" class="text-[10px] uppercase font-black text-white tracking-wider bg-blue-600 px-2 py-1 rounded">Cargando...</span>
      </div>
      <p id="clue-text" class="text-xl font-bold leading-relaxed min-h-[3em] text-slate-200">Preparando rosco...</p>
    </div>

    <div class="w-full max-w-2xl space-y-3">
      <div id="speech-box" class="bg-[#1c2535] border border-slate-700 p-4 rounded-xl text-center italic text-slate-400 min-h-[60px] flex items-center justify-center">
        Esperando respuesta...
      </div>
      <div id="fb-msg" class="text-center font-bold text-lg h-6"></div>
      
      <div class="flex gap-2">
        <input type="text" id="manual-in" placeholder="Escribí aquí..." class="flex-1 bg-[#1c2535] border border-slate-700 p-3 rounded-xl outline-none focus:border-[#f5c518] font-bold text-center" onkeydown="if(event.key==='Enter') manualSubmit()">
        <button onclick="manualSubmit()" class="bg-blue-600 px-6 rounded-xl font-bold hover:bg-blue-500 transition-colors">ENVIAR</button>
        <button onclick="btnPasapalabra()" class="bg-slate-700 px-4 rounded-xl font-bold uppercase text-xs hover:bg-slate-600 transition-colors">Pasar</button>
      </div>
    </div>
  </div>

  <!-- RESULTS SCREEN -->
  <div id="results" class="hidden w-full max-w-2xl space-y-6">
    <div class="bg-[#111827] border border-slate-800 p-8 rounded-3xl shadow-2xl text-center">
      <h2 id="res-title" class="font-bebas text-6xl text-[#f5c518] mb-6">RESULTADOS</h2>
      
      <div class="grid grid-cols-3 gap-3 mb-8">
        <div class="bg-[#1c2535] p-4 rounded-2xl border border-green-500/20">
          <div id="res-ok" class="font-bebas text-5xl text-green-500">0</div>
          <div class="text-[10px] font-bold text-slate-500 uppercase">Aciertos</div>
        </div>
        <div class="bg-[#1c2535] p-4 rounded-2xl border border-red-500/20">
          <div id="res-no" class="font-bebas text-5xl text-red-500">0</div>
          <div class="text-[10px] font-bold text-slate-500 uppercase">Errores</div>
        </div>
        <div class="bg-[#1c2535] p-4 rounded-2xl border border-yellow-500/20">
          <div id="res-sk" class="font-bebas text-5xl text-yellow-500">0</div>
          <div class="text-[10px] font-bold text-slate-500 uppercase">Salteadas</div>
        </div>
      </div>

      <h3 class="text-left font-bold text-sm text-[#f5c518] uppercase mb-3 border-b border-slate-800 pb-2">Revisión del Rosco</h3>
      <div id="review-list" class="max-h-[350px] overflow-y-auto custom-scroll space-y-2 pr-2 mb-6"></div>

      <button onclick="location.reload()" class="w-full bg-[#f5c518] text-black font-bebas text-2xl py-3 rounded-xl hover:bg-[#e6a800]">
        JUGAR OTRA VEZ
      </button>
    </div>
  </div>

  <script>

        'G': [{t:'Contiene la G', w:'juego', h:'Actividad para divertirse con reglas.'}],
        'H': [{t:'Empieza con H', w:'hormiga', h:'Insecto muy trabajador que vive bajo tierra.'}],
        'I': [{t:'Empieza con I', w:'iman', h:'Objeto que atrae metales como el hierro.'}],
        'J': [{t:'Contiene la J', w:'reloj', h:'Aparato para medir el tiempo.'}],
        'L': [{t:'Empieza con L', w:'linterna', h:'Objeto portátil que sirve para dar luz.'}],
        'M': [{t:'Empieza con M', w:'martillo', h:'Herramienta para clavar clavos.'}],
        'N': [{t:'Contiene la N', w:'pantalon', h:'Prenda de vestir que cubre las piernas.'}],
        'O': [{t:'Empieza con O', w:'oceano', h:'Gran masa de agua salada que cubre la Tierra.'}],
        'P': [{t:'Empieza con P', w:'puente', h:'Construcción para pasar sobre un río.'}],
        'R': [{t:'Contiene la R', w:'carro', h:'Vehículo de cuatro ruedas.'}],
        'S': [{t:'Empieza con S', w:'serpiente', h:'Reptil largo que se arrastra por el suelo.'}],
        'T': [{t:'Empieza con T', w:'tesoro', h:'Cosas valiosas como oro escondidas.'}],
        'U': [{t:'Contiene la U', w:'luz', h:'Lo que emite una lámpara.'}],
        'V': [{t:'Empieza con V', w:'ventana', h:'Abertura en la pared para ver afuera.'}],
        'Z': [{t:'Empieza con Z', w:'zorro', h:'Animal astuto con cola peluda.'}]
      },
      'hard': {
        'A': [{t:'Empieza con A', w:'acertijo', h:'Frase o pregunta con respuesta difícil de hallar.'}],
        'B': [{t:'Contiene la B', w:'escribir', h:'Representar ideas mediante letras.'}],
        'C': [{t:'Empieza con C', w:'crepusculo', h:'Claridad que hay antes de salir el sol o después de ponerse.'}],
        'D': [{t:'Empieza con D', w:'desenlace', h:'Final o conclusión de una historia.'}],
        'E': [{t:'Contiene la E', w:'planeta', h:'Cuerpo celeste que gira alrededor de una estrella.'}],
        'F': [{t:'Empieza con F', w:'fosforo', h:'Palito de madera para encender fuego.'}],
        'G': [{t:'Empieza con G', w:'galaxia', h:'Conjunto enorme de estrellas y planetas.'}],
        'H': [{t:'Contiene la H', w:'zanahoria', h:'Hortaliza naranja de raíz comestible.'}],
        'I': [{t:'Empieza con I', w:'itinerario', h:'Ruta o plan de un viaje.'}],
        'J': [{t:'Empieza con J', w:'jeroglifico', h:'Escritura antigua con símbolos y dibujos.'}],
        'L': [{t:'Contiene la L', w:'eclipse', h:'Cuando un astro oculta a otro.'}],
        'M': [{t:'Empieza con M', w:'metamorfosis', h:'Cambio de forma de algunos animales.'}],
        'N': [{t:'Empieza con N', w:'nostalgia', h:'Sentimiento de tristeza por el pasado.'}],
        'O': [{t:'Contiene la O', w:'bosque', h:'Lugar con mucha vegetación y árboles.'}],

      },
      'impossible': {

        'E': [{t:'Empieza con E', w:'efervescente', h:'Que desprende burbujas de gas.'}],
        'F': [{t:'Empieza con F', w:'filantropo', h:'Persona que ayuda a los demás desinteresadamente.'}],
        'G': [{t:'Contiene la G', w:'paradigmatico', h:'Que sirve de ejemplo o modelo.'}],
        'H': [{t:'Empieza con H', w:'holistico', h:'Que considera el sistema como un todo.'}],
        'I': [{t:'Empieza con I', w:'idiosincrasia', h:'Rasgos distintivos de un individuo o grupo.'}],
        'J': [{t:'Contiene la J', w:'adyacente', h:'Que está situado al lado de otra cosa.'}],
        'L': [{t:'Empieza con L', w:'lexicografia', h:'Técnica de componer diccionarios.'}],
        'M': [{t:'Empieza con M', w:'mnemotecnia', h:'Técnica para facilitar la memoria.'}],
        'N': [{t:'Contiene la N', w:'intringulis', h:'Dificultad o complicación oculta de algo.'}],
        'O': [{t:'Empieza con O', w:'onirico', h:'Relacionado con el mundo de los sueños.'}],
        'P': [{t:'Empieza con P', w:'procrastinar', h:'Diferir o aplazar una tarea.'}],
        'R': [{t:'Contiene la R', w:'oximoron', h:'Figura que combina dos conceptos opuestos.'}],
        'S': [{t:'Empieza con S', w:'sinestesia', h:'Mezcla de sensaciones de sentidos distintos.'}],
        'T': [{t:'Empieza con T', w:'tautologia', h:'Repetición innecesaria de un pensamiento.'}],
        'U': [{t:'Contiene la U', w:'consuetudinario', h:'Que es de costumbre o tradicional.'}],
        'V': [{t:'Empieza con V', w:'vituperar', h:'Criticar a alguien con mucha dureza.'}],
        'Z': [{t:'Contiene la Z', w:'estoicismo', h:'Fortaleza ante la adversidad.'}]
      }
    };

    let gameDuration = 120, timeLeft = 120, timer = null;
    let difficulty = 'easy';
    let currentRosco = [], currentIndex = 0, cellStates = {}, running = false, processing = false;
    let recognition = null, listening = false;

    function setDifficulty(lvl, btn) {
      difficulty = lvl;
      document.querySelectorAll('#setup .btn-select').forEach(b => {
          if (b.innerText === '1 MIN' || b.innerText === '2 MIN' || b.innerText === '3 MIN' || b.innerText === '5 MIN') return;
          b.classList.remove('active');
      });
      btn.classList.add('active');
      
      const desc = document.getElementById('diff-desc');
      if(lvl === 'easy') { desc.innerText = "Palabras simples y mucho tiempo para pensar."; gameDuration = 240; }
      if(lvl === 'medium') { desc.innerText = "Palabras comunes. Desafío equilibrado."; gameDuration = 120; }
      if(lvl === 'hard') { desc.innerText = "Términos literarios y abstractos. ¡Cuidado!"; gameDuration = 90; }
      if(lvl === 'impossible') { desc.innerText = "Conceptos avanzados. Solo para expertos."; gameDuration = 60; }
      
      timeLeft = gameDuration;
      updateTimerDisplay();
    }

    function setGameTime(s, btn) {
      gameDuration = s;
      document.querySelectorAll('#setup .btn-select').forEach(b => {
          if (b.innerText.includes('MIN')) b.classList.remove('active');
      });
      btn.classList.add('active');
      document.getElementById('custom-time').value = '';
      timeLeft = gameDuration;
      updateTimerDisplay();
    }

    function setCustomTime(val) {
      if (val > 0) {
        gameDuration = parseInt(val);
        timeLeft = gameDuration;
        updateTimerDisplay();
      }
    }

    function updateTimerDisplay() {
      const m = Math.floor(timeLeft / 60);
      const s = timeLeft % 60;
      const disp = document.getElementById('timer');
      if(disp) disp.textContent = `${m}:${s < 10 ? '0'+s : s}`;
    }

    function normalize(text) {
      return text.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "").trim();
    }

    function buildRosco() {
      const letters = Object.keys(DB_WORDS[difficulty]).sort();
      currentRosco = letters.map(ltr => {
        const options = DB_WORDS[difficulty][ltr];
        const choice = options[Math.floor(Math.random() * options.length)];
        return {
          l: ltr,
          type: choice.t,
          hint: choice.h,
          answer: choice.w
        };
      });
    }

    function initGame() {
      buildRosco();
      document.getElementById('setup').classList.add('hidden');
      document.getElementById('game').classList.remove('hidden');
      document.getElementById('game').classList.add('flex');
      
      initSpeech();
      drawRoscoUI();
      running = true;
      timeLeft = gameDuration;
      startClock();
      showClue();
    }

    function drawRoscoUI() {
      const svg = document.getElementById('rsvg');
      svg.innerHTML = '';
      const cx = 210, cy = 210, radius = 175, n = currentRosco.length;
      currentRosco.forEach((q, i) => {
        const angle = (i / n) * 2 * Math.PI - Math.PI / 2;
        const x = cx + radius * Math.cos(angle);
        const y = cy + radius * Math.sin(angle);
        const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
        g.id = `c-${q.l}`;
        g.setAttribute('class', 'c-def');
        const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
        circle.setAttribute('cx', x); circle.setAttribute('cy', y); circle.setAttribute('r', '18');
        const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
        text.setAttribute('x', x); text.setAttribute('y', y + 5); text.setAttribute('text-anchor', 'middle');
        text.textContent = q.l;
        g.appendChild(circle); g.appendChild(text); svg.appendChild(g);
        cellStates[q.l] = 'def';
      });
    }

    function initSpeech() {
      const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!SR) {
        document.getElementById('speech-box').textContent = "Voz no disponible en este navegador.";
        return;
      }
      recognition = new SR();
      recognition.lang = 'es-AR';
      recognition.continuous = false;
      recognition.onstart = () => { 
        listening = true; 
        document.getElementById('speech-box').textContent = "Escuchando..."; 
        document.getElementById('speech-box').classList.add('listening');
      };
      recognition.onresult = (e) => {
        const text = e.results[0][0].transcript;
        document.getElementById('speech-box').textContent = `"${text}"`;
        handleAnswer(text);
      };
      recognition.onend = () => { 
        listening = false; 
        document.getElementById('speech-box').classList.remove('listening');
      };
    }

    function speak(txt, cb) {
      window.speechSynthesis.cancel();
      const u = new SpeechSynthesisUtterance(txt);
      u.lang = 'es-AR'; 
      if(difficulty === 'hard') u.rate = 1.3;
      else if(difficulty === 'impossible') u.rate = 1.5;
      else u.rate = 1.1;

      u.onend = cb;
      window.speechSynthesis.speak(u);
    }

    function showClue() {
      if (!running) return;
      const q = currentRosco[currentIndex];
      document.getElementById('letter-label').textContent = q.l;
      document.getElementById('clue-type').textContent = q.type;
      document.getElementById('clue-text').textContent = q.hint;
      document.getElementById('fb-msg').textContent = '';
      document.getElementById('manual-in').value = '';
      updateCell(q.l, 'act');
      processing = false;

      speak(q.type + ". " + q.hint, () => {
        if (running && !processing && recognition && !listening) {
          try { recognition.start(); } catch(e) {}
        }
      });
    }

    function handleAnswer(raw) {
      if (processing || !running) return;
      processing = true;
      const clean = normalize(raw);
      
      const skipTerms = ["pasapalabra", "pasa", "paso", "siguiente"];
      if (skipTerms.some(t => clean.includes(t))) {
        btnPasapalabra();
        return;
      }

      const q = currentRosco[currentIndex];
      const correct = normalize(q.answer);
      
      if (clean === correct || clean.includes(correct)) {
        processResult(true);
      } else {
        processResult(false);
      }
    }

    function processResult(isOk) {
      const q = currentRosco[currentIndex];
      const fb = document.getElementById('fb-msg');
      if (isOk) {
        updateCell(q.l, 'ok');
        fb.textContent = "¡CORRECTO!";
        fb.className = "text-center font-bold text-lg text-green-500";
        document.getElementById('sc-ok').textContent = parseInt(document.getElementById('sc-ok').textContent) + 1;
        speak("¡Correcto!", nextLetter);
      } else {
        updateCell(q.l, 'no');
        fb.textContent = `FALLO. Era: ${q.answer.toUpperCase()}`;
        fb.className = "text-center font-bold text-lg text-red-500";
        document.getElementById('sc-no').textContent = parseInt(document.getElementById('sc-no').textContent) + 1;
        speak("Incorrecto. Era " + q.answer, nextLetter);
      }
    }

    function btnPasapalabra() {
      if (processing && !listening) return;
      processing = true;
      const q = currentRosco[currentIndex];
      updateCell(q.l, 'sk');
      document.getElementById('fb-msg').textContent = "PASAPALABRA";
      document.getElementById('fb-msg').className = "text-center font-bold text-lg text-yellow-500";
      nextLetter();
    }

    function nextLetter() {
      let found = false;
      let startSearch = (currentIndex + 1) % currentRosco.length;
      
      for (let i = 0; i < currentRosco.length; i++) {
        let idx = (startSearch + i) % currentRosco.length;
        if (cellStates[currentRosco[idx].l] === 'def' || cellStates[currentRosco[idx].l] === 'sk') {
          currentIndex = idx;
          found = true;
          break;
        }
      }
      
      let pendientes = Object.values(cellStates).filter(s => s === 'sk' || s === 'def').length;
      document.getElementById('sc-sk').textContent = pendientes;

      if (!found || pendientes === 0) finishGame("¡ROSCO COMPLETADO!");
      else setTimeout(showClue, 800);
    }

    function updateCell(letter, state) {
      const g = document.getElementById(`c-${letter}`);
      if (g) { g.setAttribute('class', `c-${state}`); cellStates[letter] = state; }
    }

    function startClock() {
      const bar = document.getElementById('progress-bar');
      timer = setInterval(() => {
        timeLeft--;
        updateTimerDisplay();
        bar.style.width = `${(timeLeft / gameDuration) * 100}%`;
        if (timeLeft <= 0) finishGame("¡TIEMPO AGOTADO!");
      }, 1000);
    }

    function manualSubmit() {
      const val = document.getElementById('manual-in').value;
      if (val) handleAnswer(val);
    }

    function askExit() {
      if (confirm("¿Querés salir? Se perderá la partida actual.")) location.reload();
    }

    function finishGame(reason) {
      running = false;
      clearInterval(timer);
      window.speechSynthesis.cancel();
      document.getElementById('game').classList.add('hidden');
      document.getElementById('results').classList.remove('hidden');
      document.getElementById('res-title').textContent = reason;
      
      const ok = document.getElementById('sc-ok').textContent;
      const no = document.getElementById('sc-no').textContent;
      document.getElementById('res-ok').textContent = ok;
      document.getElementById('res-no').textContent = no;
      document.getElementById('res-sk').textContent = currentRosco.length - (parseInt(ok) + parseInt(no));

      const list = document.getElementById('review-list');
      list.innerHTML = '';
      currentRosco.forEach(q => {
        const st = cellStates[q.l];
        const row = document.createElement('div');
        row.className = `p-3 rounded-xl border ${st==='ok'?'bg-green-500/10 border-green-500/20':st==='no'?'bg-red-500/10 border-red-500/20':'bg-slate-800/50 border-slate-700'} flex flex-col gap-1`;
        row.innerHTML = `
          <div class="flex justify-between items-center">
            <span class="font-bebas text-xl ${st==='ok'?'text-green-500':st==='no'?'text-red-500':'text-yellow-500'}">${q.l} - ${q.type}</span>
            <span class="font-bold text-sm uppercase text-white">${q.answer}</span>
          </div>
          <p class="text-[11px] text-slate-400 italic">${q.hint}</p>
        `;
        list.appendChild(row);
      });
    }

    // Initialize display
    updateTimerDisplay();
  </script>
</body>
</html>
