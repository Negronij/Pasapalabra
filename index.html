<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pasapalabra - Audio Visualizer Edition</title>
    <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Nunito:wght@400;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root {
            --bg: #0a0e1a; --surface: #111827; --surface2: #1c2535;
            --gold: #f5c518; --gold2: #e6a800; --blue: #2563eb;
            --green: #22c55e; --red: #ef4444; --text: #f1f5f9;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Nunito', sans-serif; overflow-x: hidden; }
        .font-bebas { font-family: 'Bebas Neue', sans-serif; }

        /* --- MIC ANIMATION --- */
        .mic-container {
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100px;
            height: 100px;
            margin: 0 auto;
        }
        .mic-wave {
            position: absolute;
            border-radius: 50%;
            background: rgba(245, 197, 24, 0.2);
            width: 100%;
            height: 100%;
            z-index: 1;
            transition: transform 0.1s ease-out;
            pointer-events: none;
        }
        .mic-btn {
            position: relative;
            z-index: 10;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            background: var(--surface2);
            border: 4px solid var(--gold);
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .mic-btn.active {
            background: var(--gold);
            color: black;
            box-shadow: 0 0 20px var(--gold);
        }

        /* --- ROSCO STYLES --- */
        .rosco-wrap { position: relative; width: min(380px, 85vw); height: min(380px, 85vw); margin: 0 auto; }
        .c-def circle { fill: #1c2535; stroke: #3a4a66; stroke-width: 2; }
        .c-def text { fill: #f1f5f9; font-size: 13px; font-weight: bold; pointer-events: none; }
        .c-act circle { fill: #1a2a50; stroke: var(--gold); stroke-width: 4; filter: drop-shadow(0 0 8px var(--gold)); }
        .c-ok circle { fill: #14532d; stroke: var(--green); stroke-width: 3; }
        .c-no circle { fill: #450a0a; stroke: var(--red); stroke-width: 3; }
        .c-sk circle { fill: #2a2000; stroke: var(--gold); stroke-width: 2; stroke-dasharray: 4; }

        .custom-scroll::-webkit-scrollbar { width: 6px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: var(--surface2); border-radius: 10px; }
    </style>
</head>
<body class="p-4 flex flex-col items-center min-h-screen">

    <header class="text-center mb-6">
        <h1 class="font-bebas text-6xl text-[#f5c518] tracking-widest drop-shadow-lg">PASAPALABRA</h1>
        <p class="text-xs uppercase tracking-[0.3em] text-slate-500 font-bold">Edición Voz & Ondas</p>
    </header>

    <!-- SETUP SCREEN -->
    <div id="setup" class="w-full max-w-md space-y-4">
        <div class="bg-[#111827] border border-slate-800 p-6 rounded-2xl shadow-2xl space-y-6">
            <div>
                <h2 class="text-[#f5c518] font-bold text-sm uppercase mb-3 tracking-wider">🌟 Dificultad</h2>
                <div class="grid grid-cols-2 gap-2" id="diff-btns">
                    <button onclick="setDiff('easy', this)" class="bg-slate-800 p-3 rounded-xl text-xs font-black border-2 border-transparent active-btn transition-all">FÁCIL</button>
                    <button onclick="setDiff('medium', this)" class="bg-slate-800 p-3 rounded-xl text-xs font-black border-2 border-transparent">MEDIO</button>
                    <button onclick="setDiff('hard', this)" class="bg-slate-800 p-3 rounded-xl text-xs font-black border-2 border-transparent">DIFÍCIL</button>
                    <button onclick="setDiff('impossible', this)" class="bg-slate-800 p-3 rounded-xl text-xs font-black border-2 border-transparent">IMPOSIBLE</button>
                </div>
            </div>
            <div>
                <h2 class="text-[#f5c518] font-bold text-sm uppercase mb-3 tracking-wider">⏱ Tiempo</h2>
                <div class="flex gap-2">
                    <input type="number" id="time-input" value="120" class="w-full bg-slate-900 border border-slate-700 p-3 rounded-xl text-center font-bold outline-none focus:border-gold">
                    <span class="flex items-center text-slate-500 font-bold">SEG</span>
                </div>
            </div>
        </div>
        <button onclick="startGame()" class="w-full bg-[#f5c518] text-black font-bebas text-3xl py-4 rounded-2xl shadow-lg hover:scale-[1.02] active:scale-95 transition-all">
            ¡EMPEZAR EL ROSCO!
        </button>
    </div>

    <!-- GAME SCREEN -->
    <div id="game" class="hidden w-full max-w-4xl flex-col items-center gap-4">
        <div class="w-full bg-[#111827] border border-slate-800 p-4 rounded-2xl flex items-center justify-between shadow-xl">
            <div id="timer" class="font-bebas text-4xl text-[#f5c518] w-24">2:00</div>
            <div class="flex gap-4">
                <div class="text-green-500 font-bold">✓ <span id="sc-ok">0</span></div>
                <div class="text-red-500 font-bold">✗ <span id="sc-no">0</span></div>
            </div>
            <button onclick="location.reload()" class="bg-red-500/10 text-red-500 px-4 py-2 rounded-xl text-[10px] font-black uppercase">Salir</button>
        </div>

        <div class="rosco-wrap">
            <svg id="rsvg" viewBox="0 0 420 420" xmlns="http://www.w3.org/2000/svg"></svg>
        </div>

        <div class="w-full max-w-xl bg-[#111827] border border-slate-800 rounded-2xl p-6 shadow-2xl relative">
            <div class="flex items-center gap-3 mb-2">
                <span id="letter-label" class="font-bebas text-5xl text-[#f5c518]">A</span>
                <span id="clue-type" class="text-[10px] uppercase font-black text-white px-2 py-1 rounded bg-blue-600">...</span>
            </div>
            <p id="clue-text" class="text-lg font-bold text-slate-200 min-h-[3em]">Preparando pista...</p>
        </div>

        <!-- VOICE AREA -->
        <div class="w-full max-w-xl space-y-4">
            <div class="mic-container">
                <div id="mic-wave" class="mic-wave"></div>
                <button id="mic-btn" onclick="toggleManualMic()" class="mic-btn">🎙</button>
            </div>
            
            <div id="status-msg" class="text-center text-sm font-bold text-slate-500 italic">Esperando...</div>
            
            <div class="flex gap-2">
                <input type="text" id="manual-in" placeholder="Escribe aquí..." class="flex-1 bg-[#1c2535] border border-slate-700 p-3 rounded-xl outline-none focus:border-[#f5c518] font-bold text-center">
                <button onclick="manualSubmit()" class="bg-blue-600 px-6 rounded-xl font-bold hover:bg-blue-500 transition-colors">ENVIAR</button>
                <button onclick="btnPasapalabra()" class="bg-slate-700 px-4 rounded-xl font-bold uppercase text-xs">PASAR</button>
            </div>
        </div>
    </div>

    <!-- RESULTS SCREEN -->
    <div id="results" class="hidden w-full max-w-2xl">
        <div class="bg-[#111827] border border-slate-800 p-8 rounded-3xl text-center space-y-6">
            <h2 id="res-title" class="font-bebas text-6xl text-[#f5c518]">FINAL</h2>
            <div class="grid grid-cols-3 gap-2">
                <div class="bg-slate-900 p-4 rounded-xl"><div id="res-ok" class="text-3xl font-bold text-green-500">0</div><div class="text-[10px]">OK</div></div>
                <div class="bg-slate-900 p-4 rounded-xl"><div id="res-no" class="text-3xl font-bold text-red-500">0</div><div class="text-[10px]">ERROR</div></div>
                <div id="res-sk-box" class="bg-slate-900 p-4 rounded-xl"><div id="res-sk" class="text-3xl font-bold text-yellow-500">0</div><div class="text-[10px]">PASADAS</div></div>
            </div>
            <div id="review-list" class="text-left space-y-2 max-h-60 overflow-y-auto custom-scroll p-2 bg-black/20 rounded-xl">
                <!-- Se llena dinámicamente -->
            </div>
            <button onclick="location.reload()" class="w-full bg-[#f5c518] text-black font-bebas text-3xl py-4 rounded-2xl">VOLVER A JUGAR</button>
        </div>
    </div>

                'E': [{w:'entelequia', h:'Cosa irreal imaginaria.'}], 'F': [{w:'facundia', h:'Desenvoltura al hablar.'}],
                'G': [{w:'paradigmatico', h:'Que sirve de modelo.'}], 'H': [{w:'heuristica', h:'Arte de inventar.'}],
                'I': [{w:'idiosincrasia', h:'Rasgos distintivos.'}], 'J': [{w:'objetivismo', h:'Doctrina filosófica.'}],
                'K': [{w:'kakistocracia', h:'Gobierno de los peores.'}], 'L': [{w:'lexicografia', h:'Técnica de diccionarios.'}],
                'M': [{w:'mnemotecnia', h:'Trucos para memorizar.'}], 'O': [{w:'onirico', h:'Relativo a los sueños.'}],
                'P': [{w:'procrastinar', h:'Aplazar tareas.'}], 'Q': [{w:'oblicuidad', h:'Inclinación de algo.'}],
                'R': [{w:'oximoron', h:'Dos ideas opuestas juntas.'}], 'S': [{w:'sinestesia', h:'Mezcla de sensaciones.'}],
                'T': [{w:'tautologia', h:'Repetición inútil.'}], 'U': [{w:'consuetudinario', h:'Que es por costumbre.'}],
                'V': [{w:'vituperar', h:'Criticar duramente.'}], 'W': [{w:'showman', h:'Hombre espectáculo.'}],
                'X': [{w:'exornar', h:'Embellecer con adornos.'}], 'Y': [{w:'proyeccion', h:'Acción de proyectar.'}],
                'Z': [{w:'estoicismo', h:'Fortaleza ante desgracia.'}]

        let diff = 'easy';
        let timeLeft = 120, totalTime = 120, timerInt = null;
        let questions = [], curIdx = 0, cellStates = {}, running = false;
        let recognition = null, isListening = false, audioCtx = null, analyser = null;
        const syn = window.speechSynthesis;

        function setDiff(lvl, btn) {
            diff = lvl;
            document.querySelectorAll('#diff-btns button').forEach(b => b.classList.remove('bg-gold', 'text-black'));
            btn.classList.add('bg-gold', 'text-black');
        }

        function buildRosco() {
            const letters = Object.keys(DB[diff]).sort();
            questions = letters.map(l => {
                const opt = DB[diff][l][Math.floor(Math.random() * DB[diff][l].length)];
                return {
                    l, 
                    ans: opt.w, 
                    hint: opt.h, 
                    type: opt.t || (opt.h.toLowerCase().includes('contiene') ? 'Contiene la ' + l : 'Empieza con ' + l)
                };
            });
        }

        function drawRoscoUI() {
            const svg = document.getElementById('rsvg');
            svg.innerHTML = '';
            const cx=210, cy=210, r=170, n=questions.length;
            questions.forEach((q, i) => {
                const angle = (i/n) * 2 * Math.PI - Math.PI/2;
                const x = cx + r * Math.cos(angle);
                const y = cy + r * Math.sin(angle);
                const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
                g.id = `c-${q.l}`; g.setAttribute('class', 'c-def transition-all duration-500');
                const c = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
                c.setAttribute('cx', x); c.setAttribute('cy', y); c.setAttribute('r', '16');
                const t = document.createElementNS('http://www.w3.org/2000/svg', 'text');
                t.setAttribute('x', x); t.setAttribute('y', y+5); t.setAttribute('text-anchor', 'middle');
                t.textContent = q.l;
                g.appendChild(c); g.appendChild(t); svg.appendChild(g);
                cellStates[q.l] = 'def';
            });
        }

        function initRecognition() {
            const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!SR) return alert("Tu navegador no soporta reconocimiento de voz.");
            recognition = new SR();
            recognition.lang = 'es-AR';
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => {
                isListening = true;
                document.getElementById('mic-btn').classList.add('active');
                document.getElementById('status-msg').textContent = "Escuchando...";
                startVisualizer();
            };
            recognition.onend = () => {
                isListening = false;
                document.getElementById('mic-btn').classList.remove('active');
                document.getElementById('status-msg').textContent = "Presiona el micro para hablar";
                stopVisualizer();
            };
            recognition.onresult = (e) => {
                const text = e.results[0][0].transcript;
                document.getElementById('manual-in').value = text;
                handleAnswer(text);
            };
            recognition.onerror = (e) => {
                console.error("Speech Error:", e.error);
                if(e.error === 'network') document.getElementById('status-msg').textContent = "Error de red. Prueba escribir.";
            };
        }

        async function startVisualizer() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                analyser = audioCtx.createAnalyser();
                const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
                const source = audioCtx.createMediaStreamSource(stream);
                source.connect(analyser);
            }
            const data = new Uint8Array(analyser.frequencyBinCount);
            const wave = document.getElementById('mic-wave');
            
            function update() {
                if (!isListening) return;
                analyser.getByteFrequencyData(data);
                let sum = 0;
                for(let i=0; i<data.length; i++) sum += data[i];
                const volume = sum / data.length;
                const scale = 1 + (volume / 50); // Ajuste de sensibilidad
                wave.style.transform = `scale(${scale})`;
                requestAnimationFrame(update);
            }
            update();
        }

        function stopVisualizer() {
            document.getElementById('mic-wave').style.transform = `scale(1)`;
        }

        function startGame() {
            totalTime = parseInt(document.getElementById('time-input').value) || 120;
            timeLeft = totalTime;
            buildRosco();
            drawRoscoUI();
            initRecognition();
            document.getElementById('setup').classList.add('hidden');
            document.getElementById('game').classList.remove('hidden');
            document.getElementById('game').classList.add('flex');
            running = true;
            startClock();
            showClue();
        }

        function showClue() {
            if (!running) return;
            const q = questions[curIdx];
            document.getElementById('letter-label').textContent = q.l;
            document.getElementById('clue-type').textContent = q.type;
            document.getElementById('clue-text').textContent = q.hint;
            document.getElementById('manual-in').value = '';
            updateCell(q.l, 'act');

            // Hablar pista y luego abrir mic
            syn.cancel();
            const ut = new SpeechSynthesisUtterance(`${q.type}: ${q.hint}`);
            ut.lang = 'es-AR'; ut.rate = 1;
            ut.onend = () => {
                if (running && !isListening) try { recognition.start(); } catch(e){}
            };
            syn.speak(ut);
        }

        function handleAnswer(raw) {
            if (!running) return;
            const clean = normalize(raw);
            const q = questions[curIdx];
            
            if (clean === "pasapalabra" || clean === "paso" || clean === "pasar") {
                btnPasapalabra();
                return;
            }

            if (clean === normalize(q.ans)) {
                updateCell(q.l, 'ok');
                document.getElementById('sc-ok').textContent = parseInt(document.getElementById('sc-ok').textContent) + 1;
                speakResult("¡Correcto!");
            } else {
                updateCell(q.l, 'no');
                document.getElementById('sc-no').textContent = parseInt(document.getElementById('sc-no').textContent) + 1;
                speakResult(`Incorrecto. Era ${q.ans}`);
            }
        }

        function speakResult(msg) {
            syn.cancel();
            const ut = new SpeechSynthesisUtterance(msg);
            ut.lang = 'es-AR';
            ut.onend = () => setTimeout(nextLetter, 400);
            syn.speak(ut);
        }

        function nextLetter() {
            let found = false;
            for (let i = 1; i <= questions.length; i++) {
                let idx = (curIdx + i) % questions.length;
                if (cellStates[questions[idx].l] === 'def' || cellStates[questions[idx].l] === 'sk') {
                    curIdx = idx;
                    found = true;
                    break;
                }
            }
            if (!found) finish("¡COMPLETADO!");
            else showClue();
        }

        function btnPasapalabra() {
            updateCell(questions[curIdx].l, 'sk');
            nextLetter();
        }

        function updateCell(ltr, st) {
            const g = document.getElementById(`c-${ltr}`);
            if (g) g.setAttribute('class', `c-${st}`);
            cellStates[ltr] = st;
        }

        function normalize(t) {
            return t.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "").replace(/[^a-z0-9]/g, "").trim();
        }

        function toggleManualMic() {
            if (isListening) recognition.stop();
            else recognition.start();
        }

        function manualSubmit() {
            handleAnswer(document.getElementById('manual-in').value);
        }

        function startClock() {
            timerInt = setInterval(() => {
                timeLeft--;
                const m = Math.floor(timeLeft/60), s = timeLeft%60;
                document.getElementById('timer').textContent = `${m}:${s<10?'0'+s:s}`;
                if (timeLeft <= 0) finish("¡TIEMPO AGOTADO!");
            }, 1000);
        }

        function finish(reason) {
            running = false;
            clearInterval(timerInt);
            syn.cancel();
            document.getElementById('game').classList.add('hidden');
            document.getElementById('results').classList.remove('hidden');
            document.getElementById('res-title').textContent = reason;
            document.getElementById('res-ok').textContent = document.getElementById('sc-ok').textContent;
            document.getElementById('res-no').textContent = document.getElementById('sc-no').textContent;
            
            // Llenar revisión
            const list = document.getElementById('review-list');
            list.innerHTML = questions.map(q => {
                const st = cellStates[q.l];
                const color = st === 'ok' ? 'text-green-400' : (st === 'no' ? 'text-red-400' : 'text-yellow-400');
                return `<div class="border-b border-slate-800 pb-1 mb-1">
                    <span class="font-bold ${color}">${q.l}:</span> ${q.ans} <span class="text-[10px] opacity-50 block">${q.hint}</span>
                </div>`;
            }).join('');
        }

        // Inicializar botón de dificultad por defecto
        setDiff('easy', document.querySelectorAll('#diff-btns button')[0]);
    </script>
</body>
</html>
